<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon AI Background Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        margin: 0;
        background: #05011a;
        color: white;
        font-family: Poppins, sans-serif;
    }

    h1 {
        text-align: center;
        margin-top: 20px;
        text-shadow: 0 0 20px #00eaff;
    }

    .box {
        max-width: 500px;
        margin: auto;
        margin-top: 20px;
        padding: 20px;
        background: rgba(0, 0, 40, 0.5);
        border-radius: 15px;
        border: 1px solid #00eaff55;
    }

    .upload-area {
        border: 2px dashed #0ff8;
        padding: 30px;
        text-align: center;
        border-radius: 15px;
        cursor: pointer;
    }

    img, canvas {
        width: 100%;
        margin-top: 15px;
        border-radius: 10px;
        display: none;
    }

    button {
        padding: 10px 17px;
        margin: 7px;
        border-radius: 8px;
        font-weight: bold;
        border: none;
        cursor: pointer;
        background: #00eaff;
        color: #000;
        box-shadow: 0 0 12px #00eaffaa;
    }

    .option-box {
        margin-top: 20px;
        display: none;
        text-align: center;
    }

    #brushSize {
        width: 90%;
        margin-top: 10px;
        display: none;
    }

</style>
</head>

<body>

<h1>Neon AI Background Studio ✨</h1>

<div class="box">

    <div class="upload-area" onclick="fileInput.click()">
        <p><b>Click / Drop Image</b></p>
        <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <img id="outputImg">
    <canvas id="editCanvas"></canvas>

    <div class="option-box" id="tools">
        <button onclick="enterManual()">Manual Erase</button>
        <button onclick="exitManual()">Exit Manual</button>
        <br>

        <label>Brush Size</label>
        <input type="range" id="brushSize" min="8" max="60" value="25">

        <br><br>
        <button onclick="undoErase()">Undo</button>
        <button onclick="downloadFinal()">Download</button>
    </div>

</div>

<script>
const modelBG = "https://api-inference.huggingface.co/models/briaai/BRIA-RMBG-1.4";

let outputImg = document.getElementById("outputImg");
let editCanvas = document.getElementById("editCanvas");
let ctx = editCanvas.getContext("2d");
let tools = document.getElementById("tools");
let brushSize = document.getElementById("brushSize");

let manualMode = false;
let historyStack = [];

document.getElementById("fileInput").addEventListener("change", async () => {
    let file = fileInput.files[0];
    if (!file) return;

    let res = await fetch(modelBG, {
        method: "POST",
        body: file,
        headers: {"x-wait-for-model": "true"}
    });

    let blob = await res.blob();
    outputImg.src = URL.createObjectURL(blob);
    outputImg.style.display = "block";

    tools.style.display = "block";
});

function enterManual() {
    manualMode = true;
    brushSize.style.display = "block";

    let img = new Image();
    img.src = outputImg.src;

    img.onload = () => {
        editCanvas.width = img.width;
        editCanvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        editCanvas.style.display = "block";
        outputImg.style.display = "none";
    };

    enableEraser();
}

function exitManual() {
    manualMode = false;
    brushSize.style.display = "none";

    outputImg.src = editCanvas.toDataURL();
    outputImg.style.display = "block";

    editCanvas.style.display = "none";
}

function enableEraser() {
    let drawing = false;

    editCanvas.onmousedown = (e) => {
        drawing = true;
        saveState();
        erase(e);
    };

    editCanvas.onmousemove = (e) => {
        if (drawing) erase(e);
    };

    editCanvas.onmouseup = () => drawing = false;
    editCanvas.onmouseleave = () => drawing = false;
}

function erase(e) {
    const rect = editCanvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    ctx.globalCompositeOperation = "destination-out";
    ctx.beginPath();
    ctx.arc(x, y, brushSize.value, 0, Math.PI * 2);
    ctx.fill();
}

function saveState() {
    historyStack.push(editCanvas.toDataURL());
}

function undoErase() {
    if (historyStack.length === 0) return;

    let last = historyStack.pop();
    let img = new Image();
    img.src = last;

    img.onload = () => {
        ctx.globalCompositeOperation = "source-over";
        ctx.drawImage(img, 0, 0);
    };
}

function downloadFinal() {
    let a = document.createElement("a");
    a.href = manualMode ? editCanvas.toDataURL() : outputImg.src;
    a.download = "final_image.png";
    a.click();
}
</script>

</body>
</html>
