<!DOCTYPE html>
<html>
<head>
<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  margin:0;
  padding:20px;
}
.page{
  max-width:420px;
  margin:auto;
}
input, textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  margin:8px 0;
  border:none;
}
button{
  width:100%;
  padding:12px;
  border:none;
  background:#007bff;
  color:white;
  border-radius:10px;
  margin:5px 0;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
}
.profileBox{
  margin:15px 0;
}
.storyCard{
  background:#1e1e1e;
  padding:15px;
  border-radius:12px;
  margin:10px 0;
}
.storyImg{
  width:100%;
  margin-top:8px;
  border-radius:10px;
}
.actionRow{
  display:flex;
  gap:10px;
  margin-top:8px;
}
button.small{
  padding:6px;
  width:auto;
}
</style>
<meta charset="UTF-8">
<title>Story App</title>
</head>

<body>

<!-- AUTH PAGE -->
<div id="authPage" class="page">
    <h2>Welcome to Story App</h2>

    <input id="regName" placeholder="Full Name">
    <input id="regEmail" placeholder="Email">
    <input id="regPass" type="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>

    <hr>

    <input id="logEmail" placeholder="Email">
    <input id="logPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="resetPass()">Forgot Password?</button>
</div>

<!-- HOME PAGE -->
<div id="homePage" class="page" style="display:none;">
    <div class="topbar">
        <h2>Stories</h2>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="profileBox">
        <img id="profilePic" class="avatar">
        <input type="file" id="profileImgInput" onchange="uploadProfilePic()">
        <p id="profileName"></p>
    </div>

    <textarea id="storyText" placeholder="Write a story..."></textarea>
    <input type="file" id="storyImg" accept="image/*">
    <button onclick="addStory()">Post Story</button>

    <input id="searchText" placeholder="Search stories..." oninput="loadStories()">

    <div id="storyList"></div>
</div>

<!-- MAIN JS -->
<script type="module">

/* ---------------- FIREBASE IMPORTS ---------------- */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    sendPasswordResetEmail, signOut, updateProfile
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
    getFirestore, collection, addDoc, getDocs, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import {
    getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

/* ---------------- FIREBASE CONFIG ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyAtJzjzNsBvMVj6bOfByWzX21hxSAyLYVQ",
  authDomain: "mini-instagram-95485.firebaseapp.com",
  projectId: "mini-instagram-95485",
  storageBucket: "mini-instagram-95485.firebasestorage.app",
  messagingSenderId: "426906615408",
  appId: "1:426906615408:web:1ba85f1d00b9c09e083eb5",
  measurementId: "G-V8E6NEGGZD"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore(app);
const storage = getStorage();

/* ---------------- PAGE ELEMENTS ---------------- */
const authPage = document.getElementById("authPage");
const homePage = document.getElementById("homePage");
const storyList = document.getElementById("storyList");

/* ---------------- SIGNUP ---------------- */
window.signup = async function() {
    let name = regName.value;
    let email = regEmail.value;
    let pass = regPass.value;

    let result = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(result.user, { displayName: name });

    alert("Account Created!");
};

/* ---------------- LOGIN ---------------- */
window.login = async function() {
    let email = logEmail.value;
    let pass = logPass.value;

    await signInWithEmailAndPassword(auth, email, pass);
    loadUI();
};

/* ---------------- LOGOUT ---------------- */
window.logout = async function() {
    await signOut(auth);
    location.reload();
};

/* ---------------- RESET PASS ---------------- */
window.resetPass = function() {
    sendPasswordResetEmail(auth, logEmail.value);
    alert("Reset link sent!");
};

/* ---------------- LOAD UI ---------------- */
function loadUI() {
    authPage.style.display = "none";
    homePage.style.display = "block";

    profileName.innerText = auth.currentUser.displayName;
    if (auth.currentUser.photoURL) profilePic.src = auth.currentUser.photoURL;

    loadStories();
}

/* ---------------- UPLOAD PROFILE PIC ---------------- */
window.uploadProfilePic = async function() {
    let file = profileImgInput.files[0];
    let folder = ref(storage, "profile/" + auth.currentUser.uid);

    await uploadBytes(folder, file);
    let url = await getDownloadURL(folder);

    await updateProfile(auth.currentUser, { photoURL: url });
    profilePic.src = url;
};

/* ---------------- ADD STORY ---------------- */
window.addStory = async function () {
    let text = storyText.value;
    let imgFile = storyImg.files[0];
    let imgUrl = "";

    if (imgFile) {
        let folder = ref(storage, "stories/" + Date.now());
        await uploadBytes(folder, imgFile);
        imgUrl = await getDownloadURL(folder);
    }

    await addDoc(collection(db, "stories"), {
        user: auth.currentUser.displayName,
        userPic: auth.currentUser.photoURL || "",
        text: text,
        img: imgUrl,
        time: Date.now(),
        uid: auth.currentUser.uid
    });

    storyText.value = "";
    storyImg.value = "";
    loadStories();
};

/* ---------------- LOAD STORIES ---------------- */
async function loadStories() {
    storyList.innerHTML = "";
    let search = searchText.value.toLowerCase();

    let data = await getDocs(collection(db, "stories"));
    data.forEach(d => {
        let s = d.data();

        if (!s.text.toLowerCase().includes(search)) return;

        let card = document.createElement("div");
        card.className = "storyCard";

        card.innerHTML = `
            <p><b>${s.user}</b></p>
            <p>${s.text}</p>
            ${s.img ? `<img class="storyImg" src="${s.img}">` : ""}
            <div class="actionRow">
                ${s.uid === auth.currentUser.uid ? `
                    <button class="small" onclick="delStory('${d.id}')">Delete</button>
                ` : ""}
            </div>
        `;

        storyList.appendChild(card);
    });
}

/* ---------------- DELETE STORY ---------------- */
window.delStory = async function(id) {
    await deleteDoc(doc(db, "stories", id));
    loadStories();
};

/* ---------------- CHECK AUTH ---------------- */
auth.onAuthStateChanged(user => {
    if (user) loadUI();
});
</script>

</body>
</html>
