<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GLTF Compressor</title>

<script src="https://unpkg.com/@gltf-transform/core/dist/index.umd.js"></script>
<script src="https://unpkg.com/@gltf-transform/functions/dist/index.umd.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
width:400px;
background:#111827;
padding:20px;
border-radius:12px;
text-align:center;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
background:#22c55e;
}

#download{
display:none;
background:#3b82f6;
}

.modal{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.7);

display:none;
align-items:center;
justify-content:center;

}

.modal-box{

background:#1f2937;
padding:30px;
border-radius:10px;
text-align:center;

}

.loader{

border:5px solid #374151;
border-top:5px solid #22c55e;

border-radius:50%;
width:40px;
height:40px;

animation:spin 1s linear infinite;

margin:auto;
margin-bottom:10px;

}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="card">

<h2>GLTF Compressor</h2>

<input type="file" id="file">

<br><br>

<label>Texture Size</label>

<select id="tex">
<option value="2048">2048</option>
<option value="1024">1024</option>
<option value="512">512</option>
</select>

<button onclick="compress()">Compress Model</button>

<button id="download" onclick="download()">Download Model</button>

<p id="before"></p>
<p id="after"></p>

</div>

<div class="modal" id="modal">

<div class="modal-box">

<div class="loader"></div>

<p>Processing Model...</p>

</div>

</div>

<script>

let file
let outputBlob

document.getElementById("file").onchange=e=>{
file=e.target.files[0]
}

async function compress(){

if(!file){
alert("Upload file first")
return
}

document.getElementById("modal").style.display="flex"

const before=(file.size/1024/1024).toFixed(2)

document.getElementById("before").innerText=
"Original Size: "+before+" MB"

const buffer=await file.arrayBuffer()

const {NodeIO}=gltfTransformCore
const {dedup, prune, textureResize}=gltfTransformFunctions

const io=new NodeIO()

const doc=io.readBinary(new Uint8Array(buffer))

const tex=parseInt(document.getElementById("tex").value)

await doc.transform(
dedup(),
prune(),
textureResize({size:[tex,tex]})
)

const result=io.writeBinary(doc)

outputBlob=new Blob([result],{type:"model/gltf-binary"})

const after=(outputBlob.size/1024/1024).toFixed(2)

document.getElementById("after").innerText=
"Compressed Size: "+after+" MB"

document.getElementById("modal").style.display="none"

document.getElementById("download").style.display="block"

}

function download(){

const url=URL.createObjectURL(outputBlob)

const a=document.createElement("a")

a.href=url
a.download="compressed.glb"

a.click()

}

</script>

</body>
</html>
