<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Story App</title>
<style>
body{background:#111;color:white;font-family:Arial;margin:0;padding:20px;}
.page{max-width:430px;margin:auto;}
input,textarea{width:100%;padding:10px;border-radius:10px;margin:8px 0;border:none;}
button{width:100%;padding:12px;border:none;background:#007bff;color:white;border-radius:10px;margin:5px 0;font-weight:bold;}
.story-card{background:#222;padding:12px;border-radius:8px;margin:10px 0;}
.story-title{font-size:18px;font-weight:bold;cursor:pointer;}
.hidden{display:none;}
.like-btn,.comment-btn,.delete-btn{
  background:#444;padding:6px 12px;border-radius:6px;margin-right:8px;border:none;color:white;
}
.comment-box{margin-top:10px;}
.comment-item{background:#333;padding:6px;border-radius:6px;margin:5px 0;}
.user-tag{font-size:12px;color:#bbb;margin-bottom:8px;}
</style>
</head>
<body>

<div id="authPage" class="page">
    <h2>Welcome</h2>

    <input id="signupName" placeholder="Full Name" type="text">
    <input id="signupEmail" placeholder="Email" type="email">
    <input id="signupPass" placeholder="Password" type="password">
    <button onclick="signup()">Sign Up</button>

    <hr>

    <input id="loginEmail" placeholder="Email" type="email">
    <input id="loginPass" placeholder="Password" type="password">
    <button onclick="login()">Login</button>
</div>

<div id="homePage" class="page hidden">
    <button onclick="logout()">Logout</button>

    <h3>Add Story</h3>
    <input id="storyTitle" placeholder="Story Title">
    <textarea id="storyText" placeholder="Write your story"></textarea>
    <button onclick="sendStory()">Post Story</button>

    <h3>Search</h3>
    <input id="searchInput" placeholder="Search by title..." oninput="searchStory()">

    <h3>Stories</h3>
    <div id="storyList"></div>
</div>

<script type="module" defer src="app.js"></script>

</body>
</html>
