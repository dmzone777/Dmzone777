<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon AI Background Remover</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        margin: 0;
        padding: 0;
        background: #05011a;
        font-family: Poppins, sans-serif;
        color: white;
        overflow-x: hidden;
    }

    h1 {
        text-align: center;
        font-size: 32px;
        margin-top: 20px;
        text-shadow: 0 0 20px #00f2ff;
    }

    .container {
        max-width: 450px;
        margin: auto;
        margin-top: 20px;
        padding: 20px;
        border-radius: 15px;
        background: rgba(0, 0, 40, 0.6);
        box-shadow: 0 0 20px #00e5ff55;
        border: 1px solid #0ff5;
    }

    .upload-area {
        padding: 35px;
        border: 2px dashed #0ff8;
        border-radius: 15px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
    }

    .upload-area:hover {
        background: rgba(0, 255, 255, 0.1);
        box-shadow: 0 0 20px #00eaffaa inset;
    }

    img {
        width: 100%;
        border-radius: 10px;
        margin-top: 15px;
        display: none;
    }

    #progressBox {
        width: 100%;
        background: #222;
        border-radius: 10px;
        margin-top: 15px;
        display: none;
    }

    #progressBar {
        width: 0%;
        height: 10px;
        background: #00f2ff;
        box-shadow: 0 0 10px #00f2ff;
        border-radius: 10px;
    }

    .download-buttons {
        display: none;
        margin-top: 20px;
        text-align: center;
    }

    button {
        padding: 10px 18px;
        border: none;
        margin: 8px;
        background: #00f2ff;
        color: #000;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 0 15px #00f2ff99;
        transition: .3s;
    }

    button:hover {
        box-shadow: 0 0 25px #00f2ff;
    }
</style>
</head>

<body>

<h1>Neon AI Background Remover ⚡</h1>

<div class="container">
    <div class="upload-area" onclick="fileInput.click()">
        <p><b>Drop Image / Click to Upload</b></p>
        <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <img id="inputPreview">
    <div id="progressBox"><div id="progressBar"></div></div>
    <img id="outputPreview">

    <div class="download-buttons">
        <button onclick="download('png')">Download PNG</button>
        <button onclick="download('jpg')">Download JPG</button>
        <button onclick="download('webp')">Download WEBP</button>
    </div>
</div>

<script>
const modelURL = "https://api-inference.huggingface.co/models/briaai/BRIA-RMBG-1.4";
const input = document.getElementById("fileInput");
const inputPreview = document.getElementById("inputPreview");
const outputPreview = document.getElementById("outputPreview");
const progressBox = document.getElementById("progressBox");
const progressBar = document.getElementById("progressBar");
const downloadBox = document.querySelector(".download-buttons");
let finalBlob;

input.addEventListener("change", async () => {
    let file = input.files[0];
    if (!file) return;

    inputPreview.src = URL.createObjectURL(file);
    inputPreview.style.display = "block";

    progressBox.style.display = "block";
    progressBar.style.width = "30%";

    let formData = new FormData();
    formData.append("file", file);

    progressBar.style.width = "60%";

    let res = await fetch(modelURL, {
        method: "POST",
        body: file,
        headers: { "x-wait-for-model": "true" }
    });

    progressBar.style.width = "90%";

    let blob = await res.blob();
    finalBlob = blob;

    outputPreview.src = URL.createObjectURL(blob);
    outputPreview.style.display = "block";

    progressBar.style.width = "100%";

    downloadBox.style.display = "block";
});

function download(type) {
    let a = document.createElement("a");
    a.download = "bg_removed." + type;
    a.href = URL.createObjectURL(finalBlob);
    a.click();
}
</script>

</body>
</html>
