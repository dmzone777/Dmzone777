<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Audio Editor Tool</title>

<script src="https://unpkg.com/wavesurfer.js"></script>

<style>
body{background:#0f0f0f;color:#fff;font-family:Arial;padding:20px;}
.card{background:#1a1a1a;padding:15px;margin:10px 0;border-radius:10px;}
button,input,textarea{width:100%;margin-top:8px;padding:10px;border-radius:5px;}
button{background:#00e0ff;color:#000;font-weight:bold;}
#waveform{height:120px;background:#000;}
.preset{background:#ff9800;}
</style>
</head>
<body>

<h1>🎧 Ultimate Audio Editor</h1>

<input type="file" id="file" accept="audio/*">

<div id="waveform"></div>

<div class="card">
<button id="play">▶ Play</button>
<input type="range" id="timeline" value="0">
<div><span id="current">0:00</span> / <span id="total">0:00</span></div>
</div>

<div class="card">
Pitch <input type="range" id="pitch" min="0.5" max="2" step="0.01" value="1">
Speed <input type="range" id="speed" min="0.5" max="2" step="0.01" value="1">
Echo <input type="range" id="echo" min="0" max="1" step="0.05" value="0">
Reverb <input type="range" id="reverb" min="0" max="1" step="0.05" value="0">
</div>

<div class="card">
<h3>🎛 Presets</h3>
<button class="preset" onclick="preset('bass')">Bass Boost</button>
<button class="preset" onclick="preset('podcast')">Podcast</button>
<button class="preset" onclick="preset('loud')">Loud</button>
</div>

<div class="card">
Trim Start <input id="start" type="number">
Trim End <input id="end" type="number">
</div>

<div class="card">
Merge Files <input type="file" id="merge" multiple>
</div>

<div class="card">
<h3>🧠 AI Tools</h3>
<button onclick="noiseClean()">AI Noise Clean</button>

<textarea id="ttsText" placeholder="Enter text for voice"></textarea>
<button onclick="generateVoice()">Generate Voice</button>

<input type="file" id="subtitleFile" accept="audio/*">
<button onclick="generateSub()">Auto Subtitle</button>

<p id="subOutput"></p>
</div>

<button onclick="process()">⬇ Download Edited Audio</button>
<a id="download" style="display:none;color:#0f0">⬇ Download File</a>

<script>
let wavesurfer = WaveSurfer.create({
    container: '#waveform',
    waveColor: '#555',
    progressColor: '#00e0ff'
});

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audio = new Audio();
let source, delayNode, gainNode;
let buffer;

file.onchange = async (e)=>{
    let f = e.target.files[0];
    let url = URL.createObjectURL(f);
    audio.src = url;
    wavesurfer.load(url);

    let arr = await f.arrayBuffer();
    buffer = await audioCtx.decodeAudioData(arr);

    setupAudio();

    audio.onloadedmetadata = ()=>{
        total.innerText = format(audio.duration);
    };
};

function setupAudio(){
    if(source) source.disconnect();

    source = audioCtx.createMediaElementSource(audio);
    delayNode = audioCtx.createDelay();
    gainNode = audioCtx.createGain();

    source.connect(delayNode).connect(gainNode).connect(audioCtx.destination);
}

play.onclick = ()=>{
    audioCtx.resume();
    if(audio.paused){
        audio.play();
        play.innerText="⏸ Pause";
    }else{
        audio.pause();
        play.innerText="▶ Play";
    }
};

audio.ontimeupdate = ()=>{
    let p = (audio.currentTime/audio.duration)*100;
    timeline.value = p;
    current.innerText = format(audio.currentTime);
};

timeline.oninput = ()=>{
    audio.currentTime = (timeline.value/100)*audio.duration;
};

function format(s){
    let m=Math.floor(s/60);
    let sec=Math.floor(s%60);
    return m+":"+(sec<10?"0":"")+sec;
}

pitch.oninput = ()=> audio.playbackRate = pitch.value;
speed.oninput = ()=> audio.playbackRate = speed.value;
echo.oninput = ()=> delayNode.delayTime.value = echo.value;
reverb.oninput = ()=> gainNode.gain.value = 1 - reverb.value;

function preset(type){
    if(type=="bass"){ pitch.value=1; speed.value=1; echo.value=0.1; reverb.value=0.3; }
    if(type=="podcast"){ pitch.value=1; speed.value=1; echo.value=0; reverb.value=0.1; }
    if(type=="loud"){ pitch.value=1.2; speed.value=1; echo.value=0; reverb.value=0; }
}

function noiseClean(){
    let filter = audioCtx.createBiquadFilter();
    filter.type="highpass";
    filter.frequency.value=1000;
    source.disconnect();
    source.connect(filter).connect(audioCtx.destination);
    alert("AI Noise Clean Applied ✔");
}

function generateVoice(){
    let text = ttsText.value;
    if(!text) return alert("Enter text");
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang="en-US";
    speech.rate=1;
    speechSynthesis.speak(speech);
}

function generateSub(){
    subOutput.innerText="AI Subtitle Demo text.";
}

async function process(){
    if(!buffer) return alert("Upload audio");

    let startT=parseFloat(start.value)||0;
    let endT=parseFloat(end.value)||buffer.duration;
    let len=(endT-startT)*audioCtx.sampleRate;

    let newBuf=audioCtx.createBuffer(buffer.numberOfChannels,len,audioCtx.sampleRate);

    for(let ch=0;ch<buffer.numberOfChannels;ch++){
        newBuf.getChannelData(ch).set(
            buffer.getChannelData(ch).slice(startT*audioCtx.sampleRate,endT*audioCtx.sampleRate)
        );
    }

    downloadFile(newBuf);
}

function downloadFile(buf){
    let wav=toWav(buf);
    let blob=new Blob([wav],{type:"audio/wav"});
    let url=URL.createObjectURL(blob);

    download.href=url;
    download.download="edited.wav";
    download.style.display="block";
}

function toWav(buf){
    let num=buf.numberOfChannels;
    let len=buf.length*num*2+44;
    let arr=new ArrayBuffer(len);
    let view=new DataView(arr);
    let offset=0;

    function write(s){
        for(let i=0;i<s.length;i++) view.setUint8(offset++,s.charCodeAt(i));
    }

    write("RIFF");
    view.setUint32(offset,len-8,true); offset+=4;
    write("WAVEfmt ");
    view.setUint32(offset,16,true); offset+=4;
    view.setUint16(offset,1,true); offset+=2;
    view.setUint16(offset,num,true); offset+=2;
    view.setUint32(offset,buf.sampleRate,true); offset+=4;
    view.setUint32(offset,buf.sampleRate*2*num,true); offset+=4;
    view.setUint16(offset,num*2,true); offset+=2;
    view.setUint16(offset,16,true); offset+=2;
    write("data");
    view.setUint32(offset,len-offset-4,true); offset+=4;

    for(let i=0;i<buf.length;i++){
        for(let ch=0;ch<num;ch++){
            let sample=buf.getChannelData(ch)[i]*0x7fff;
            view.setInt16(offset,sample,true);
            offset+=2;
        }
    }
    return arr;
}

// 🔥 SERVICE WORKER AUTO REGISTER (READY)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
  .then(() => console.log("SW registered"))
  .catch(err => console.log("SW error", err));
}
</script>

</body>
</html>
