<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Neon AI Background Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    background: #05011a;
    font-family: Poppins, sans-serif;
    color: white;
}
h1 {
    text-align: center;
    margin-top: 20px;
    text-shadow: 0 0 20px #00eaff;
}
.box {
    max-width: 500px;
    margin: auto;
    margin-top: 20px;
    padding: 20px;
    background: rgba(0,0,40,0.5);
    border-radius: 15px;
}
.upload-area {
    border: 2px dashed #0ff8;
    padding: 25px;
    text-align: center;
    cursor: pointer;
    border-radius: 12px;
}
img,canvas {
    width: 100%;
    border-radius: 10px;
    margin-top: 15px;
    display: none;
}
button {
    padding: 10px 17px;
    margin: 7px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #00eaff;
    color: #000;
    font-weight: bold;
    box-shadow: 0 0 12px #00eaffaa;
}
#brushSize {
    width: 90%;
    display: none;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>Neon AI Background Studio ✨</h1>

<div class="box">

    <div class="upload-area" onclick="fileInput.click()">
        <p><b>Upload Image</b></p>
        <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <img id="outputImg">

    <canvas id="editCanvas"></canvas>

    <div id="tools" style="display:none; text-align:center;">
        <button onclick="startManual()">Manual Erase</button>
        <button onclick="applyManual()">Apply</button>
        <br>
        <label>Brush Size</label>
        <input type="range" id="brushSize" min="10" max="70" value="30">
        <br>
        <button onclick="undo()">Undo</button>
        <button onclick="downloadFinal()">Download</button>
    </div>

</div>

<script>
const modelURL = "https://api-inference.huggingface.co/models/briaai/BRIA-RMBG-1.4";

let outputImg = document.getElementById("outputImg");
let canvas = document.getElementById("editCanvas");
let ctx = canvas.getContext("2d");
let brush = document.getElementById("brushSize");

let erasing = false;
let undoStack = [];

document.getElementById("fileInput").addEventListener("change", async () => {
    let file = fileInput.files[0];
    if (!file) return;

    // AI background remove
    let res = await fetch(modelURL, {
        method: "POST",
        body: file,
        headers: { "x-wait-for-model": "true" }
    });

    let blob = await res.blob();
    let url = URL.createObjectURL(blob);

    outputImg.src = url;
    outputImg.style.display = "block";

    document.getElementById("tools").style.display = "block";
});

function startManual() {
    let img = new Image();
    img.src = outputImg.src;

    img.onload = () => {
        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);
        canvas.style.display = "block";
        outputImg.style.display = "none";

        enableErase();
    };

    brush.style.display = "block";
}

function enableErase() {

    const getPos = (e) => {
        let rect = canvas.getBoundingClientRect();
        let x, y;

        if (e.touches) {
            x = e.touches[0].clientX - rect.left;
            y = e.touches[0].clientY - rect.top;
        } else {
            x = e.clientX - rect.left;
            y = e.clientY - rect.top;
        }

        return { x, y };
    };

    const erase = (e) => {
        let pos = getPos(e);

        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, brush.value, 0, Math.PI * 2);
        ctx.fill();
    };

    canvas.onmousedown = (e) => {
        undoSave();
        erasing = true;
        erase(e);
    };

    canvas.onmousemove = (e) => {
        if (erasing) erase(e);
    };

    canvas.onmouseup = () => erasing = false;
    canvas.onmouseleave = () => erasing = false;

    // TOUCH
    canvas.ontouchstart = (e) => {
        undoSave();
        erasing = true;
        erase(e);
    };
    canvas.ontouchmove = (e) => {
        if (erasing) erase(e);
    };
    canvas.ontouchend = () => erasing = false;
}

function undoSave() {
    undoStack.push(canvas.toDataURL());
}

function undo() {
    if (undoStack.length === 0) return;

    let img = new Image();
    img.src = undoStack.pop();

    img.onload = () => ctx.drawImage(img, 0, 0);
}

function applyManual() {
    outputImg.src = canvas.toDataURL();
    outputImg.style.display = "block";
    canvas.style.display = "none";
    brush.style.display = "none";
}

function downloadFinal() {
    let a = document.createElement("a");
    a.href = outputImg.src;
    a.download = "final_image.png";
    a.click();
}
</script>

</body>
</html>
