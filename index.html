<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Music Web App</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.player{
background:#1a1a1a;
padding:20px;
border-radius:15px;
width:320px;
box-shadow:0 0 15px black;
}

h2{
text-align:center;
}

button{
padding:8px 12px;
margin:5px;
border:none;
border-radius:6px;
background:#ff2e63;
color:white;
cursor:pointer;
}

button:hover{
background:#ff0040;
}

input[type="file"]{
margin:10px 0;
}

#playlist{
margin-top:10px;
max-height:120px;
overflow:auto;
background:#111;
padding:5px;
border-radius:8px;
}

.song{
padding:6px;
border-bottom:1px solid #333;
cursor:pointer;
}

.song:hover{
background:#222;
}

progress{
width:100%;
margin-top:10px;
}

</style>

</head>

<body>

<div class="player">

<h2>🎵 My Music</h2>

<input type="file" id="fileInput" accept="audio/*" multiple>

<div>

<button onclick="prevSong()">⏮</button>
<button onclick="playMusic()">▶</button>
<button onclick="pauseMusic()">⏸</button>
<button onclick="nextSong()">⏭</button>

</div>

<br>

<label>Volume</label>
<input type="range" id="volume" min="0" max="1" step="0.01" value="1">

<progress id="progressBar" value="0" max="100"></progress>

<div id="playlist"></div>

<audio id="audio"></audio>

</div>

<script>

let audio=document.getElementById("audio")
let playlist=[]
let current=0

let saved=localStorage.getItem("songs")

if(saved){
playlist=JSON.parse(saved)
}

function render(){

let box=document.getElementById("playlist")
box.innerHTML=""

playlist.forEach((song,i)=>{

let div=document.createElement("div")
div.className="song"
div.innerText=song.name

div.onclick=function(){

current=i
playSong()

}

box.appendChild(div)

})

}

render()

document.getElementById("fileInput").addEventListener("change",function(){

let files=this.files

for(let file of files){

let reader=new FileReader()

reader.onload=function(e){

playlist.push({
name:file.name,
src:e.target.result
})

localStorage.setItem("songs",JSON.stringify(playlist))

render()

}

reader.readAsDataURL(file)

}

})

function playSong(){

audio.src=playlist[current].src
audio.play()

}

function playMusic(){

audio.play()

}

function pauseMusic(){

audio.pause()

}

function nextSong(){

current++

if(current>=playlist.length) current=0

playSong()

}

function prevSong(){

current--

if(current<0) current=playlist.length-1

playSong()

}

audio.ontimeupdate=function(){

let progress=(audio.currentTime/audio.duration)*100

document.getElementById("progressBar").value=progress

}

document.getElementById("volume").oninput=function(){

audio.volume=this.value

}

/* background media control */

if('mediaSession' in navigator){

navigator.mediaSession.setActionHandler('play',()=>audio.play())

navigator.mediaSession.setActionHandler('pause',()=>audio.pause())

navigator.mediaSession.setActionHandler('nexttrack',nextSong)

navigator.mediaSession.setActionHandler('previoustrack',prevSong)

}

</script>

</body>
</html>
